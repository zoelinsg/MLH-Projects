<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Packing List Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Travel Packing List Generator</h1>
        <p>Plan your perfect trip with a customized packing list!</p>
    </header>
    <main>
        <form id="packing-form">
            <div class="form-group">
                <label for="trip-type">Trip Type:</label>
                <select id="trip-type" name="trip-type">
                    <option value="">Select Trip Type</option>
                    <option value="beach">Beach</option>
                    <option value="mountain">Mountain</option>
                    <option value="city">City</option>
                    <option value="business">Business</option>
                </select>
            </div>
            <div class="form-group">
                <label for="duration">Trip Duration:</label>
                <select id="duration" name="duration">
                    <option value="">Select Duration</option>
                    <option value="1-3">1-3 days</option>
                    <option value="4-7">4-7 days</option>
                    <option value="8+">8+ days</option>
                </select>
            </div>
            <div class="form-group">
                <label for="weather">Weather:</label>
                <select id="weather" name="weather">
                    <option value="">Select Weather</option>
                    <option value="hot">Hot</option>
                    <option value="cold">Cold</option>
                    <option value="rainy">Rainy</option>
                </select>
            </div>
            <div class="form-group">
                <label>Optional Extras:</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="extras" value="laptop"> Laptop</label>
                    <label><input type="checkbox" name="extras" value="camera"> Camera</label>
                    <label><input type="checkbox" name="extras" value="medicine"> Medicine</label>
                </div>
            </div>
            <div class="button-group">
                <button type="button" id="generate-btn">Generate Packing List</button>
                <button type="button" id="clear-btn">Clear</button>
            </div>
        </form>
        <section id="result" class="hidden">
            <h2>Your Packing List</h2>
            <div id="trip-summary" class="summary-card">
                <p><strong>Trip Type:</strong> <span id="summary-trip"></span></p>
                <p><strong>Duration:</strong> <span id="summary-duration"></span></p>
                <p><strong>Weather:</strong> <span id="summary-weather"></span></p>
                <p><strong>Extras:</strong> <span id="summary-extras"></span></p>
            </div>
            <div class="category-grid">
                <div id="essentials" class="category-card">
                    <h3>Essentials</h3>
                    <ul></ul>
                </div>
                <div id="clothing" class="category-card">
                    <h3>Clothing</h3>
                    <ul></ul>
                </div>
                <div id="electronics" class="category-card">
                    <h3>Electronics</h3>
                    <ul></ul>
                </div>
                <div id="personal-care" class="category-card">
                    <h3>Personal Care</h3>
                    <ul></ul>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
