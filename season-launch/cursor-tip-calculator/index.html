<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="calculator">
    <header>
      <h1>Tip Calculator</h1>
      <p class="subtitle">Enter your bill, choose a tip, and split between people.</p>
    </header>

    <form id="tip-form" class="form">
      <label for="bill-amount" class="label">Bill amount ($)</label>
      <input
        type="number"
        id="bill-amount"
        class="input"
        placeholder="0.00"
        min="0"
        step="0.01"
        required
      >

      <fieldset class="tip-options">
        <legend class="label">Tip percentage</legend>
        <div class="tip-buttons">
          <button type="button" class="tip-btn" data-tip="10">10%</button>
          <button type="button" class="tip-btn active" data-tip="15">15%</button>
          <button type="button" class="tip-btn" data-tip="18">18%</button>
          <button type="button" class="tip-btn" data-tip="20">20%</button>
        </div>
        <label for="custom-tip" class="label custom-label">Or enter custom %</label>
        <input
          type="number"
          id="custom-tip"
          class="input"
          placeholder="Custom tip %"
          min="0"
          step="1"
        >
      </fieldset>

      <label for="num-people" class="label">Number of people</label>
      <input
        type="number"
        id="num-people"
        class="input"
        placeholder="How many people?"
        min="1"
        step="1"
      >
    </form>

    <section class="results" aria-live="polite">
      <div class="result-row">
        <span>Tip amount</span>
        <span id="tip-amount">$0.00</span>
      </div>
      <div class="result-row total">
        <span>Total amount</span>
        <span id="total-amount">$0.00</span>
      </div>
      <div class="result-row split">
        <span>Each person pays</span>
        <span id="per-person-amount">Enter the number of people to split the bill</span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
